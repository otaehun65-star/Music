<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Vibe | 한국 음악 추천 및 공유 플랫폼</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="index.css?v=12">
    <link rel="stylesheet" href="player.css?v=12">
    <link rel="stylesheet" href="comments.css?v=12">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    
    <nav class="navbar">
        <div class="logo">
            <i class="fa-solid fa-compact-disc"></i> K-Vibe
        </div>
        <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" placeholder="곡명, 아티스트, 장르 검색..." id="searchInput">
        </div>
        <div class="nav-links" id="navLinks">
            <button class="btn btn-outline" style="color:white; border-color:white;" onclick="location.href='login.html'">로그인</button>
            <button class="btn btn-primary" onclick="location.href='write.html'">글쓰기</button>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Discover Your<br><span class="gradient-text">New Favorite Song</span></h1>
            <p>당신의 플레이리스트를 채워줄 숨겨진 한국 명곡들을 찾아보세요. 취향이 비슷한 사람들과 추천을 공유하고 소통하세요.</p>
            <button class="btn btn-primary btn-large" onclick="document.getElementById('exploreSection').scrollIntoView({behavior: 'smooth'})">지금 바로 탐색하기</button>
        </div>
        <div class="hero-image">
            <div class="glass-card hero-glass-card" id="topTrendCard" style="cursor: pointer; position: relative;" title="클릭하여 즉시 감상하기">
                <div class="vinyl-record">
                    <img id="topTrendImg" src="" style="width:100%; height:100%; border-radius:50%; object-fit:cover; position:absolute; top:0; left:0; opacity: 0.85;">
                    <div class="vinyl-center" style="z-index: 2;"></div>
                </div>
                <h3><span id="topTrendTitle">베스트 트랙</span> <i class="fa-solid fa-fire" style="color:#ff3366;"></i></h3>
                <p id="topTrendArtist" style="font-weight: 600; color: white;">아티스트</p>
                <div style="margin-top:12px; font-size: 1.2rem; font-weight:900; color:#ff007f;">
                    <i class="fa-solid fa-heart"></i> <span id="topTrendLikes">0</span>
                </div>
                <div style="font-size: 0.85rem; color: #aaa; margin-top: 15px;">
                    <i class="fa-solid fa-play"></i> 클릭하여 넘버원 명곡 감상
                </div>
            </div>
        </div>
    </header>

    <main class="container" id="exploreSection">
        <section class="filters-section">
            <h2 class="section-title">Trending Now</h2>
            <div class="genre-filters" id="genreFilters">
                <button class="filter-btn active" data-genre="all">전체</button>
                <button class="filter-btn" data-genre="K-Pop">K-Pop</button>
                <button class="filter-btn" data-genre="Indie">인디</button>
                <button class="filter-btn" data-genre="Hip-hop">힙합</button>
                <button class="filter-btn" data-genre="Ballad">발라드</button>
                <button class="filter-btn" data-genre="my_playlist" style="border-color: #ff007f; color: #ffffff;"><i class="fa-solid fa-heart" style="color: #ff007f;"></i> 내 보관함</button>
            </div>
        </section>

        <section class="feed-section">
            <div class="music-grid" id="musicGrid">
                <!-- Data will be injected here by app.js -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 K-Vibe Platform. All rights reserved.</p>
    </footer>

    <!-- Native Web Audio Player -->
    <div class="music-player" id="musicPlayer" style="transform: translateY(120%); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);">
        <div class="player-info">
            <img id="playerCover" src="" alt="cover">
            <div class="player-details">
                <h4 id="playerTitle">Song Title</h4>
                <p id="playerArtist">Artist</p>
            </div>
        </div>
        <div class="player-controls">
            <button id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
            <button id="playPauseBtn" class="play-btn"><i class="fa-solid fa-play" style="margin-left:5px;"></i></button>
            <button id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
        </div>
        <div class="player-progress">
            <span id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="duration">0:00</span>
        </div>
        <audio id="audioElement" src=""></audio>
    </div>

    <!-- Comment Modal -->
    <div id="commentModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeCommentModal">&times;</span>
            <h2 id="modalSongTitle" style="margin-top: 0; color: white; display:flex; align-items:center; gap:10px;">
                <i class="fa-regular fa-comments"></i> <span id="cmTitleText">댓글</span>
            </h2>
            
            <div class="comments-area">
                <div class="comments-list" id="commentsList">
                    <!-- Javascript가 댓글을 그리는 공간 -->
                </div>
                <div class="comment-input-area">
                    <input type="text" id="newCommentInput" autocomplete="off" placeholder="이 노래에 대한 나의 생각을 남겨주세요...">
                    <button id="addCommentBtn">등록</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js?v=12"></script>
</body>
</html>
